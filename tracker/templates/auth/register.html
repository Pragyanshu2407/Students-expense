{% extends 'base.html' %}
{% block title %}Register — Expense Tracker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-sm-10 col-md-5 col-lg-4">

    <div class="card p-4">
      <h4 class="mb-4 text-center fw-bold">
        <i class="bi bi-person-plus-fill me-2 text-success"></i>Create Account
      </h4>

      <form method="POST" novalidate>
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" autofocus required />
          <div class="form-text">Only letters, numbers, and underscores.</div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" minlength="6" required />
          <div class="form-text">Minimum 6 characters.</div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Confirm Password</label>
          <input type="password" name="confirm_password" class="form-control" required />
        </div>

        <button type="submit" class="btn btn-success w-100 fw-semibold">
          <i class="bi bi-check-circle me-1"></i>Create Account
        </button>
      </form>

      <hr class="my-3" />

      <p class="text-center mb-0 small">
        Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
