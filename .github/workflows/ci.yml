name: CI – Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run pytest (SQLite in-memory, no Postgres needed) ─────────────────
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v --tb=short
        env:
          FLASK_ENV: testing   # selects TestingConfig → SQLite in-memory

  # ── Job 2: Build Docker image and smoke-test it ───────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: app
          push: false
          load: true
          tags: student-expense-tracker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          # Use SQLite so the smoke test doesn't need a running Postgres container
          docker run -d --name expense-tracker \
            -e DATABASE_URL="sqlite:////tmp/expenses.db" \
            -e SECRET_KEY="ci-smoke-test-secret" \
            -e FLASK_ENV="development" \
            -p 5000:5000 \
            student-expense-tracker:latest

          # Wait up to 30s for the app to be ready
          for i in $(seq 1 10); do
            curl -sf http://localhost:5000/health && break
            echo "Waiting for app… (attempt $i/10)"
            sleep 3
          done

          # Final check — fail the job if still not up
          curl --fail http://localhost:5000/health \
            || (docker logs expense-tracker && exit 1)

          docker stop expense-tracker
