# =============================================================================
# CI — Continuous Integration
# =============================================================================
#
# Runs on every push (all branches) and every pull request targeting main.
#
# Job graph
# ─────────
#   lint ──┐
#           ├──► test ──► docker-build
#   security ──┘
#
# The four job names below are used as REQUIRED STATUS CHECKS in GitHub branch
# protection rules.  Configure them at:
#   Repository → Settings → Branches → Branch protection rules → main
#   ✓ Require status checks to pass before merging
#     → Add: "Lint (ruff)", "Security Scan", "Test (pytest)", "Docker Build"
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]       # every branch — catch problems early
  pull_request:
    branches: [main]       # gate merges to main

# Cancel in-progress runs of the SAME workflow on the SAME branch when a new
# commit is pushed.  Saves GitHub Actions minutes and clears the queue faster.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install -r requirements-dev.txt

      # --output-format=github turns ruff errors into GitHub PR annotations
      # (the red underlines you see inline in the Files Changed tab).
      - name: Check for lint errors
        run: ruff check . --output-format=github

      # Format check — fails if any file would be re-formatted by `ruff format`.
      # This enforces a consistent code style without requiring developers to
      # run a formatter manually (they just run `ruff format .` to auto-fix).
      - name: Check code formatting
        run: ruff format . --check --diff


  # ── Job 2: Security Scan ────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install security tools
        run: pip install -r requirements-dev.txt

      # bandit scans Python source for common security anti-patterns:
      #   - Hardcoded passwords, SQL injection risks, use of unsafe functions,
      #     insecure hashing, shell injection, etc.
      # -ll  = report only MEDIUM and HIGH severity findings
      # -q   = suppress the per-file progress output
      - name: Run bandit (Python SAST)
        run: |
          bandit -r tracker/ config.py -ll -q \
            --format custom \
            --msg-template "{abspath}:{line}: [{test_id}] {msg}"

      # pip-audit checks every package in requirements.txt against the
      # OSV (Open Source Vulnerabilities) database for known CVEs.
      # Fails the build if any patched vulnerability is found.
      - name: Run pip-audit (dependency CVE scan)
        run: pip-audit -r requirements.txt --progress-spinner off


  # ── Job 3: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    needs: [lint, security]   # only test if code is clean and secure

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # TestingConfig (selected by FLASK_ENV=testing) uses SQLite in-memory.
      # No running Postgres container is needed — tests are fully self-contained.
      - name: Run pytest
        run: pytest test_app.py -v --tb=short
        env:
          FLASK_ENV: testing

      # Upload test results as a downloadable artifact so you can inspect
      # failures without having to re-run the workflow.
      - name: Upload test results
        if: always()   # run even if pytest fails so we always get the report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: .pytest_cache/
          retention-days: 7


  # ── Job 4: Docker Build + Smoke Test + Trivy Scan ──────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Buildx is required for multi-platform builds and advanced caching.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the production Docker image.
      # `load: true` makes the image available to the local Docker daemon
      # so we can run and inspect it in the steps below.
      # `cache-from/to` stores layer cache in GitHub Actions cache storage,
      # making subsequent builds significantly faster (typically 2-5×).
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: app
          push: false
          load: true
          tags: student-expense-tracker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Smoke test ────────────────────────────────────────────────────────
      # Run the image exactly as it will run in production (gunicorn + SQLite
      # instead of Postgres so no extra container is needed in CI).
      - name: Smoke test — container starts and /health responds
        run: |
          docker run --detach --name ci-app \
            --env DATABASE_URL="sqlite:////tmp/ci.db" \
            --env SECRET_KEY="ci-smoke-test-only" \
            --env FLASK_ENV="development" \
            --publish 5000:5000 \
            student-expense-tracker:ci

          echo "Waiting for app to be ready…"
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000/health; then
              echo "✓ App is healthy after $i attempt(s)"
              break
            fi
            echo "  attempt $i/15 — sleeping 3 s"
            sleep 3
          done

          # Hard failure if still not up after 45 s
          curl --fail --silent http://localhost:5000/health \
            || { echo "✗ App never became healthy"; docker logs ci-app; exit 1; }

          docker stop ci-app

      # ── Trivy container image scan ────────────────────────────────────────
      # Trivy scans the image's OS packages and language dependencies for CVEs.
      # Results are uploaded to the GitHub Security tab (Dependabot → Code
      # scanning alerts) so the team can track and triage them.
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: student-expense-tracker:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          # exit-code 0 = advisory (warn but don't fail the build).
          # Change to 1 when you are ready to enforce zero HIGH/CRITICAL CVEs.
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        continue-on-error: true   # requires GitHub Advanced Security (free for public repos only)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container
