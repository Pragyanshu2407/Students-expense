name: CI – Test & Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run pytest ────────────────────────────────────────────────────────
  test:
    name: Run Pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest test_app.py -v --tb=short

  # ── Job 2: Build Docker image ────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test          # only build if tests pass

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: app
          push: false          # set to true + add registry login to push
          tags: student-expense-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the image
        run: |
          docker run -d --name expense-tracker \
            -e DB_PATH=/data/expenses.db \
            -p 5000:5000 \
            student-expense-tracker:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/ || (docker logs expense-tracker && exit 1)
          docker stop expense-tracker
