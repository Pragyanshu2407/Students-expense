# =============================================================================
# Service — loki-svc
# =============================================================================
#
# Two ports:
#   3100 — HTTP API (Grafana queries this; Promtail pushes logs here)
#   9096 — gRPC (internal Loki-to-Loki communication, unused in single-binary mode)
#
# ClusterIP (internal) + NodePort (for manual curl testing).
#
# Apply:  kubectl apply -f k8s/monitoring/loki/service.yaml
# Test:   curl http://$(minikube ip):30310/ready
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: loki-svc
  namespace: expense-tracker
  labels:
    app: loki

spec:
  type: NodePort

  selector:
    app: loki

  ports:
    - name: http
      protocol: TCP
      port: 3100
      targetPort: 3100
      nodePort: 30310
    - name: grpc
      protocol: TCP
      port: 9096
      targetPort: 9096
