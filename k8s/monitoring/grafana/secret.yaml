# =============================================================================
# Secret — grafana-secret
# =============================================================================
#
# Stores Grafana admin credentials.
# Change GF_SECURITY_ADMIN_PASSWORD before deploying to a shared environment.
#
# To generate a strong password:
#   python3 -c "import secrets; print(secrets.token_urlsafe(16))"
#
# Apply:  kubectl apply -f k8s/monitoring/grafana/secret.yaml
# Note:   This file is NOT gitignored (credentials are example/dev values).
#         Replace with a real password or use an external secret manager
#         (e.g. Vault, AWS Secrets Manager) for production.
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: expense-tracker
  labels:
    app: grafana

# stringData: K8s auto-encodes values to base64 at apply time.
stringData:
  GF_SECURITY_ADMIN_USER: "admin"
  GF_SECURITY_ADMIN_PASSWORD: "grafana123"   # CHANGE THIS before sharing the cluster
