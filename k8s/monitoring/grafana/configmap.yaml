# =============================================================================
# ConfigMap — grafana-config
# =============================================================================
#
# Two files are mounted into the Grafana container:
#
#   1. datasources/prometheus.yaml
#      Grafana reads this at startup and automatically registers Prometheus
#      as a data source — no manual UI configuration needed.
#      Grafana "provisioning" docs: https://grafana.com/docs/grafana/latest/administration/provisioning/
#
#   2. dashboards/provider.yaml
#      Tells Grafana to load dashboard JSON files from a folder inside the pod.
#      We mount the dashboard ConfigMap (grafana-dashboards) to that folder.
#
# Apply:  kubectl apply -f k8s/monitoring/grafana/configmap.yaml
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: expense-tracker
  labels:
    app: grafana

data:
  # ── Datasource provisioning ─────────────────────────────────────────────────
  # File path inside the container: /etc/grafana/provisioning/datasources/prometheus.yaml
  prometheus.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        # prometheus-svc is resolvable inside the cluster via DNS:
        #   <service-name>.<namespace>.svc.cluster.local
        # The short form (prometheus-svc:9090) works when Grafana and Prometheus
        # are in the same namespace.
        url: http://prometheus-svc:9090
        access: proxy      # Grafana backend proxies requests (not the browser)
        isDefault: true    # make this the default data source for new panels
        editable: false    # prevent accidental UI changes

  # ── Dashboard provider provisioning ────────────────────────────────────────
  # File path inside the container: /etc/grafana/provisioning/dashboards/provider.yaml
  provider.yaml: |
    apiVersion: 1

    providers:
      - name: default
        type: file
        disableDeletion: false  # allow deleting dashboards via UI
        editable: true
        options:
          # Grafana will watch this folder for JSON files and load them as dashboards.
          # The dashboard ConfigMap is mounted here.
          path: /var/lib/grafana/dashboards
