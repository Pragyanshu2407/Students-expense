# =============================================================================
# Prometheus RBAC — ClusterRole + ClusterRoleBinding + ServiceAccount
# =============================================================================
#
# Prometheus needs read access to the Kubernetes API so it can discover
# pods/services to scrape automatically (kubernetes_sd_configs).
#
# ClusterRole grants the permissions cluster-wide.
# ClusterRoleBinding ties the ClusterRole to the prometheus ServiceAccount.
#
# Apply:  kubectl apply -f k8s/monitoring/prometheus/rbac.yaml
# =============================================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: expense-tracker
  labels:
    app: prometheus

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
  labels:
    app: prometheus
rules:
  # Read pod, service, and endpoint metadata — needed for service discovery
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  # Read node cAdvisor metrics — CPU and memory per container
  - apiGroups: [""]
    resources: ["nodes/metrics"]
    verbs: ["get"]
  # Read ingress metadata
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # Access /metrics endpoints on nodes via the API proxy
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
  labels:
    app: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: expense-tracker
