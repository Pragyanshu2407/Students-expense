# =============================================================================
# Service — prometheus-svc
# =============================================================================
#
# NodePort service so you can open the Prometheus UI from your browser on
# your local machine (outside the cluster).
#
# Grafana uses the ClusterIP (prometheus-svc:9090) to query Prometheus.
# You use NodePort 30900 to browse metrics directly:
#   http://$(minikube ip):30900
#
# Apply:  kubectl apply -f k8s/monitoring/prometheus/service.yaml
# Access: minikube service prometheus-svc -n expense-tracker --url
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: prometheus-svc
  namespace: expense-tracker
  labels:
    app: prometheus

spec:
  type: NodePort

  selector:
    app: prometheus

  ports:
    - name: web
      protocol: TCP
      port: 9090          # ClusterIP port (used by Grafana)
      targetPort: 9090    # container port
      nodePort: 30900     # fixed NodePort for browser access
