# =============================================================================
# ConfigMap — nginx-config
# =============================================================================
#
# Stores the nginx.conf file as a Kubernetes ConfigMap.
# The Nginx Deployment mounts this ConfigMap as a file at /etc/nginx/nginx.conf.
#
# Key difference from docker-compose:
#   docker-compose: upstream server web:5000          (docker service name)
#   Kubernetes:     upstream server expense-web-svc:5000  (K8s service DNS name)
#
# Apply:  kubectl apply -f k8s/nginx/configmap.yaml
# Verify: kubectl get configmap nginx-config -n expense-tracker
#         kubectl describe configmap nginx-config -n expense-tracker
#
# After updating this ConfigMap, restart Nginx pods to pick up the new config:
#   kubectl rollout restart deployment/expense-nginx -n expense-tracker
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: expense-tracker
  labels:
    app: expense-nginx

data:
  # The key "nginx.conf" becomes the filename when mounted as a volume.
  nginx.conf: |
    worker_processes auto;

    error_log /var/log/nginx/error.log warn;
    pid       /var/run/nginx.pid;

    events {
        worker_connections 1024;
        use                epoll;
        multi_accept       on;
    }

    http {
        include      /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" rt=$request_time';

        access_log /var/log/nginx/access.log main;

        sendfile       on;
        tcp_nopush     on;
        tcp_nodelay    on;
        keepalive_timeout 65;

        gzip            on;
        gzip_vary       on;
        gzip_proxied    any;
        gzip_comp_level 6;
        gzip_types      text/plain text/css text/xml application/json
                        application/javascript application/xml+rss image/svg+xml;

        # ── Rate limiting ────────────────────────────────────────────────────
        # 5 login requests per minute per IP — prevents brute-force attacks.
        limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

        # ── Upstream — Flask/Gunicorn pods via Kubernetes Service DNS ────────
        # "expense-web-svc" resolves to the ClusterIP of expense-web-svc.
        # Kubernetes load-balances across all healthy expense-web pods.
        upstream flask_app {
            server expense-web-svc:5000;
            keepalive 16;
        }

        server {
            listen      80;
            server_name _;   # match any hostname (Ingress handles host routing)

            client_max_body_size 5M;

            # Security headers
            add_header X-Frame-Options        "SAMEORIGIN"             always;
            add_header X-Content-Type-Options "nosniff"                always;
            add_header X-XSS-Protection       "1; mode=block"          always;
            add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

            # Login endpoint — rate-limited
            location /auth/login {
                limit_req zone=login_limit burst=10 nodelay;
                proxy_pass         http://flask_app;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
            }

            # Health endpoint — no access logging (reduces noise in K8s probes)
            location /health {
                proxy_pass         http://flask_app;
                access_log         off;
                proxy_set_header   Host $host;
            }

            # All other traffic
            location / {
                proxy_pass           http://flask_app;
                proxy_set_header     Host              $host;
                proxy_set_header     X-Real-IP         $remote_addr;
                proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header     X-Forwarded-Proto $scheme;
                proxy_connect_timeout 10s;
                proxy_send_timeout    60s;
                proxy_read_timeout    60s;
                proxy_buffering       on;
                proxy_buffer_size     4k;
                proxy_buffers         8 16k;
            }

            error_page 502 503 504 /50x.html;
            location = /50x.html {
                root /usr/share/nginx/html;
            }
        }
    }
