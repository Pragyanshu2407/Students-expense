# =============================================================================
# Nginx reverse-proxy configuration — Student Expense Tracker
#
# Role of Nginx in this stack:
#   Browser → Nginx (port 80) → Flask/Gunicorn (port 5000, internal only)
#
# Why put Nginx in front of Gunicorn?
#   - Nginx is extremely efficient at handling slow clients, keep-alive
#     connections, and static files without tying up Python workers.
#   - It adds security headers and can terminate TLS in future (Phase 3+).
#   - Gunicorn is intentionally NOT exposed on any host port — only Nginx is.
# =============================================================================

# --------------------------------------------------------------------------
# Global settings
# --------------------------------------------------------------------------
worker_processes  auto;          # one worker per CPU core

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;    # max simultaneous connections per worker
    use                 epoll;   # Linux I/O event model (most efficient)
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --------------------------------------------------------------------------
    # Logging
    # --------------------------------------------------------------------------
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent" '
                      'rt=$request_time';

    access_log  /var/log/nginx/access.log  main;

    # --------------------------------------------------------------------------
    # Performance tweaks
    # --------------------------------------------------------------------------
    sendfile            on;    # use kernel-level file transfer
    tcp_nopush          on;    # batch TCP packets
    tcp_nodelay         on;    # low-latency for small payloads
    keepalive_timeout   65;    # how long to keep idle connections open
    types_hash_max_size 2048;

    # Compress text responses before sending — saves bandwidth
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css text/xml application/json
                      application/javascript application/xml+rss
                      application/atom+xml image/svg+xml;

    # --------------------------------------------------------------------------
    # Upstream — the Gunicorn workers inside the web container.
    # "web" is the docker-compose service name; Docker's DNS resolves it.
    # --------------------------------------------------------------------------
    upstream flask_app {
        server web:5000;

        # If you scale `web` to multiple replicas, add more lines:
        #   server web_2:5000;
        #   server web_3:5000;
        keepalive 32;           # reuse upstream connections
    }

    # --------------------------------------------------------------------------
    # Rate limiting — basic protection against brute-force login attempts.
    # Stores IP → request-rate in a 10 MB shared memory zone.
    # --------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # --------------------------------------------------------------------------
    # Virtual host
    # --------------------------------------------------------------------------
    server {
        listen       80;
        server_name  localhost;

        # Maximum size of an uploaded file (forms, future file uploads)
        client_max_body_size 5M;

        # ------------------------------------------------------------------
        # Security headers
        # These instruct the browser to apply extra protections.
        # ------------------------------------------------------------------
        add_header X-Frame-Options          "SAMEORIGIN"             always;
        add_header X-Content-Type-Options   "nosniff"                always;
        add_header X-XSS-Protection         "1; mode=block"          always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

        # ------------------------------------------------------------------
        # Login endpoint — apply rate limiting
        # Prevents automated brute-force password attacks.
        # ------------------------------------------------------------------
        location /auth/login {
            limit_req zone=login_limit burst=10 nodelay;

            proxy_pass         http://flask_app;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------------------------------
        # Health-check endpoint — skip access logging to reduce noise
        # ------------------------------------------------------------------
        location /health {
            proxy_pass         http://flask_app;
            access_log         off;
            proxy_set_header   Host $host;
        }

        # ------------------------------------------------------------------
        # All other requests — proxy to Gunicorn
        # ------------------------------------------------------------------
        location / {
            proxy_pass         http://flask_app;

            # Tell Flask the real client IP (visible in logs)
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # How long Nginx waits for Gunicorn to respond
            proxy_connect_timeout   10s;
            proxy_send_timeout      60s;
            proxy_read_timeout      60s;

            # Buffer settings — prevents slow clients from tying up Gunicorn
            proxy_buffering         on;
            proxy_buffer_size       4k;
            proxy_buffers           8 16k;
        }

        # ------------------------------------------------------------------
        # Custom error pages — served directly by Nginx without hitting Flask
        # ------------------------------------------------------------------
        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
